<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <title>United Lane Offline</title>
    <style>
      :root { color: #0f172a; background: #eef2f7; font-family: Segoe UI, Arial, sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; padding: 20px; }
      main { width: min(100%, 460px); display: grid; gap: 14px; padding: 22px; border: 1px solid rgba(100, 116, 139, .22); border-radius: 8px; background: #fff; box-shadow: 0 18px 40px rgba(15, 23, 42, .12); }
      span { color: #166534; font-size: 12px; font-weight: 900; text-transform: uppercase; }
      h1 { margin: 0; font-size: 26px; line-height: 1.1; }
      p { margin: 0; color: #475569; line-height: 1.5; }
      button { min-height: 44px; border: 0; border-radius: 8px; background: #0f172a; color: #fff; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <span>Offline Mode</span>
      <h1>United Lane is waiting for connection.</h1>
      <p>The app shell is installed. Reconnect to load live chat, safety, driver, routing, and Motive data.</p>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
  </body>
</html>
